<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Concept 3: Hexagone/monde avec zones qui se dévoilent -->
  <!-- Outer hex -->
  <polygon points="60,8 108,32 108,88 60,112 12,88 12,32" fill="#0d1b2a" stroke="#ff8c00" stroke-width="2.5"/>
  <!-- Inner grid hexes - honeycomb -->
  <polygon points="60,28 80,40 80,60 60,72 40,60 40,40" fill="rgba(255,140,0,0.55)" stroke="#ff8c00" stroke-width="0.8"/>
  <polygon points="80,40 100,52 100,72 80,84 60,72 60,52" fill="rgba(255,140,0,0.4)" stroke="#ff8c00" stroke-width="0.5"/>
  <polygon points="40,40 60,28 60,48 40,60 20,48 20,28" fill="rgba(255,140,0,0.35)" stroke="#ff8c00" stroke-width="0.5"/>
  <polygon points="60,72 80,84 80,100 60,108 40,100 40,84" fill="rgba(255,140,0,0.25)" stroke="#ff8c00" stroke-width="0.5"/>
  <polygon points="40,60 60,72 60,92 40,100 20,92 20,72" fill="rgba(255,140,0,0.15)" stroke="#ff8c00" stroke-width="0.5"/>
  <!-- Locked zone hint -->
  <polygon points="20,28 40,40 40,60 20,48" fill="none" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3"/>
  <!-- Center marker -->
  <circle cx="60" cy="50" r="5" fill="#ff8c00"/>
  <circle cx="60" cy="50" r="2" fill="#0d1b2a"/>
</svg>